<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen Music Together</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'wpf-bg': '#F5F5F5',
                        'wpf-border': '#E0E0E0',
                        'wpf-title': '#111111',
                        'wpf-artist': '#666666',
                        'wpf-status': '#888888',
                        'wpf-app': '#222222',
                        'wpf-progress': '#4285F4',
                        'wpf-track': '#CCCCCC',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center font-sans">
    <div id="app" class="bg-wpf-bg rounded-2xl shadow-2xl p-4 w-[420px] border border-wpf-border">
        <!-- Header: App name + session index -->
        <div class="flex items-center gap-2 mb-2">
            <h1 id="appName" class="text-lg font-bold text-wpf-app">无播放信息</h1>
            <span id="sessionIndex" class="text-xs text-gray-400">0/0</span>
        </div>

        <!-- Main content: song info + cover -->
        <div class="flex gap-3">
            <!-- Left: song info, fixed height 100px, 3 rows -->
            <div class="flex-1 flex flex-col justify-center h-[100px] min-w-0">
                <p id="title" class="text-2xl font-bold text-wpf-title truncate">Title</p>
                <p id="artist" class="text-lg text-wpf-artist truncate">Artist</p>
                <p id="playState" class="text-base text-wpf-status">状态</p>
            </div>

            <!-- Right: album cover -->
            <div class="w-[100px] h-[100px] rounded-lg overflow-hidden flex-shrink-0 bg-gray-300">
                <img id="cover" class="w-full h-full object-cover hidden" src="" alt="Album Cover">
            </div>
        </div>

        <!-- Progress bar -->
        <div class="mt-3">
            <div class="h-2.5 bg-wpf-track rounded-full overflow-hidden">
                <div id="progressFill" class="h-full bg-wpf-progress rounded-full transition-all duration-200" style="width: 0%"></div>
            </div>
            <div class="flex justify-between mt-1">
                <span id="currentTime" class="text-xs text-wpf-artist">00:00</span>
                <span id="totalTime" class="text-xs text-wpf-artist">00:00</span>
            </div>
        </div>

        <!-- Audio status -->
        <p id="audioStatus" class="text-xs text-gray-500 mt-1">等待播放</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
